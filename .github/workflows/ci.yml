name: CI and Live Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build

  deploy-live:
    name: Deploy live frontend (Vercel)
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != ''
    environment:
      name: production
      url: https://audit-ai-app.vercel.app
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: vercel-deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Live deployment: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Show deployment URL
        run: |
          echo "Deployment URL: ${{ steps.vercel-deploy.outputs.deployment_url }}"
          echo "Production URL: https://audit-ai-app.vercel.app" >> "$GITHUB_STEP_SUMMARY"

  deploy-live-not-configured:
    name: Live deploy not configured
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && (secrets.VERCEL_TOKEN == '' || secrets.VERCEL_ORG_ID == '' || secrets.VERCEL_PROJECT_ID == '')

    steps:
      - name: Add setup note
        run: |
          echo "Live deploy skipped: add VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID secrets to enable automatic deployment." >> "$GITHUB_STEP_SUMMARY"