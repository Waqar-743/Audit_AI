name: CI and Live Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build

  deploy-live:
    name: Deploy live frontend (Vercel)
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://audit-ai-app.vercel.app
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        id: verify-vercel-secrets
        run: |
          missing=0
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "Missing VERCEL_TOKEN" >> "$GITHUB_STEP_SUMMARY"
            missing=1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "Missing VERCEL_ORG_ID" >> "$GITHUB_STEP_SUMMARY"
            missing=1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "Missing VERCEL_PROJECT_ID" >> "$GITHUB_STEP_SUMMARY"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Live deploy skipped: configure missing Vercel secrets in repository settings." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.verify-vercel-secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.verify-vercel-secrets.outputs.ready == 'true'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.verify-vercel-secrets.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        if: steps.verify-vercel-secrets.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        if: steps.verify-vercel-secrets.outputs.ready == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: steps.verify-vercel-secrets.outputs.ready == 'true'
        id: vercel-deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Live deployment: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Show deployment URL
        if: steps.verify-vercel-secrets.outputs.ready == 'true'
        run: |
          echo "Deployment URL: ${{ steps.vercel-deploy.outputs.deployment_url }}"
          echo "Production URL: https://audit-ai-app.vercel.app" >> "$GITHUB_STEP_SUMMARY"